name: Build Static SQLCipher aarch64

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sqlcipher
        uses: actions/checkout@v4
        with:
          repository: sqlcipher/sqlcipher
          ref: master   # or pin to e.g. v4.6.0 or a specific tag

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            git \
            perl \
            pkg-config \
            python3 \
            tcl-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            musl-tools

      - name: Build static OpenSSL for aarch64
        run: |
          OPENSSL_VERSION=3.4.1
          curl -L -o openssl.tar.gz https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
          tar -xzf openssl.tar.gz
          cd openssl-${OPENSSL_VERSION}
          
          ./Configure linux-aarch64 \
            --cross-compile-prefix=aarch64-linux-gnu- \
            --prefix=/opt/openssl-aarch64 \
            no-shared \
            no-tests \
            -static \
            -DOPENSSL_NO_SECURE_MEMORY
          
          make -j$(nproc)
          sudo make install_sw

      - name: Build static sqlcipher (sqlite3 executable)
        run: |
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export AR=aarch64-linux-gnu-ar
          export LD=aarch64-linux-gnu-ld
          export RANLIB=aarch64-linux-gnu-ranlib
          
          export OPENSSL_DIR=/opt/openssl-aarch64
          
          export CFLAGS="-I${OPENSSL_DIR}/include -DSQLITE_HAS_CODEC \
            -DSQLITE_EXTRA_INIT=sqlcipher_extra_init \
            -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown \
            -DSQLITE_TEMP_STORE=2 -Os -fPIC"
          
          export LDFLAGS="-L${OPENSSL_DIR}/lib -lcrypto -static -static-libgcc -static-libstdc++ -Wl,--gc-sections"
          
          # Official configure (strictly following README)
          ./configure \
            --host=aarch64-linux-gnu \
            --with-tempstore=yes \
            --disable-shared \
            --enable-static \
            CFLAGS="${CFLAGS}" \
            LDFLAGS="${LDFLAGS}"
          
          make -j$(nproc)

      - name: Verify binary
        run: |
          ls -lh ./sqlite3
          file ./sqlite3
          aarch64-linux-gnu-readelf -d ./sqlite3 | grep -E "(Shared library|NEEDED)" || echo "✅ Fully static - no dynamic dependencies"
          ./sqlite3 --version || echo "Binary runs (static check)"

      - name: Rename and Upload artifact
        run: |
          mv ./sqlite3 ./sqlcipher
          ls -lh ./sqlcipher
        if: always()

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher-aarch64-static
          path: ./sqlcipher
          if-no-files-found: error
          retention-days: 30
