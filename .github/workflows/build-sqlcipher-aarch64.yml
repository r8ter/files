name: Build Static SQLCipher aarch64

on:
  workflow_dispatch: # 支持手动触发编译

jobs:
  build-aarch64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cross-Compilation Toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            build-essential \
            tcl-dev \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      - name: Download Sources
        run: |
          # 动态获取最新的 OpenSSL 3.x 稳定版
          git clone --depth 1 -b openssl-3.3 https://github.com/openssl/openssl.git openssl_src
          # 克隆最新稳定的 SQLCipher
          git clone --depth 1 https://github.com/sqlcipher/sqlcipher.git sqlcipher_src

      - name: Build Static OpenSSL for aarch64
        run: |
          cd openssl_src
          # 配置交叉编译，只生成静态库 (no-shared)
          export CROSS_COMPILE=aarch64-linux-gnu-
          ./Configure linux-aarch64 no-shared --prefix=$(pwd)/../openssl_assets
          make -j$(nproc)
          make install_dev
          cd ..

      - name: Build Fully Static SQLCipher for aarch64
        run: |
          cd sqlcipher_src
          
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 修正点：将 --enable-tempstore=yes 改为 --enable-tempstore=2
          ./configure \
            --host=aarch64-linux-gnu \
            --enable-tempstore=2 \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLITE_EXTRA_INIT=sqlcipher_extra_init -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown -O2" \
            LDFLAGS="-static $(pwd)/../openssl_assets/lib/libcrypto.a -lpthread -ldl -lm" \
            CC="aarch64-linux-gnu-gcc"

          # 编译 sqlite3 命令行工具
          make -j$(nproc) sqlite3
          
          # 验证生成的文件架构
          file sqlite3
          cd ..

      - name: Prepare Artifact
        run: |
          mkdir -p output
          # 将编译好的二进制复制出来并重命名为带有架构特征的名称
          cp sqlcipher_src/sqlite3 output/sqlcipher-aarch64-static
          chmod +x output/sqlcipher-aarch64-static

      - name: Upload Static Binary
        uses: actions/upload-artifact@v4
        with:
          name: sqlcipher-aarch64-static-binary
          path: output/sqlcipher-aarch64-static
          if-no-files-found: error
